<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }
        .container {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        input {
            width: 70%;
            padding: 8px;
        }
        button {
            padding: 8px 12px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        li {
            list-style: none;
            padding: 5px;
            margin: 5px;
            background: #ddd;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>My To-Do List</h2>
    <input type="text" id="task" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="list"></ul>
</div>

<script>
function addTask() {
    let task = document.getElementById("task").value;
    if(task === "") return;

    let li = document.createElement("li");
    li.innerHTML = task + " <button onclick='this.parentElement.remove()'>X</button>";

    document.getElementById("list").appendChild(li);
    document.getElementById("task").value = "";
}
</script>

</body>
</html>
